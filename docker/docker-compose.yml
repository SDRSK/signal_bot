version: "3"

services:
  bot:
    build: .
    depends_on:
      - db
    environment:
      - DB_HOST=db
    restart: always

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: cryptobot
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: bot
    ports:
      - "5432:5432"
    restart: always